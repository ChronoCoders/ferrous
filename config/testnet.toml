# Ferrous Network Testnet Configuration

[network]
network_type = "testnet"
magic_bytes = "0xFE520926"
default_port = 8333
max_connections = 125
max_inbound = 100
max_outbound = 25

[chain]
# Genesis block hash (deterministic from code)
genesis_hash = "48ddae95500e21bff39f823ebabfd65df7fa1b796bb867f0351bc7bf773c1c43"

# Initial difficulty (Regtest-like for early testing)
initial_difficulty = 0x1d00ffff
difficulty_adjustment = true

# Block timing
target_block_time = 600  # 10 minutes

[consensus]
max_block_size = 4000000  # 4MB
max_block_weight = 4000000
coinbase_maturity = 100
subsidy_halving_interval = 840000

[rpc]
enabled = true
bind_address = "127.0.0.1:8332"
username = "ferrous"
# Password should be set via environment variable

[mining]
enabled = false  # Disabled by default on seed nodes

[storage]
data_dir = "/var/lib/ferrous"
cache_size_mb = 500

[logging]
level = "info"
file = "/var/log/ferrous/node.log"

# Seed nodes (each node connects to others)
[peers]
seed_nodes = [
    "seed1.ferrous.network:8333",
    "seed2.ferrous.network:8333",
    "seed3.ferrous.network:8333",
    "seed4.ferrous.network:8333",
    "seed5.ferrous.network:8333",
]
